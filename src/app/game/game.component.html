<div *ngIf="gameState" class="row">
  <div class="col-md-9">
    <app-game-board [gameState]="gameState" [playerName]="playerName" [lastDiceRoll]="lastDiceRoll"
      [isHost]="isHost.bind(this)" [startGame]="startGame.bind(this)" [getPlayerColor]="getPlayerColor.bind(this)">
    </app-game-board>
  </div>

  <div class="col-md-3">
    <div class="controls mt-3" *ngIf="gameState.started">
      <div *ngFor="let player of gameState.players; let i = index" class="player-info"
        [style.backgroundColor]="getPlayerColor(player.id)" [class.active]="gameState.currentPlayer === i">
        <h4>{{ player.name }}</h4>
        <p>Money: ₹{{ player.money }}</p>
        <p>Properties: {{ player.properties.length }}</p>
      </div>
      <div class="dice">
        <button class="btn btn-lg btn-primary mb-2" (click)="rollDice()" [disabled]="!isCurrentPlayer()">
          Roll Dice
        </button>
      </div>
    </div>
  </div>
</div>
